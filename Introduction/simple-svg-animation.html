<!doctype html>
<html lang="en">
  <head>
    <title>Simple SVG Animation</title>

    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #111;
      }

      button {
        background-color: #111;
        border: 1px solid #333;
      }
      svg circle {
        fill: hotpink;
        transition:
          r 400ms,
          cy 600ms;
      }

      button:hover circle,
      button:focus-visible circle {
        /* focus-visible is pseudo-class used for keyboard focus */
        r: 50;
        cy: 100;
      }
    </style>
  </head>
  <body>
    <button>
      <svg width="100" height="100">
        <circle cx="50" cy="50" r="30" />
      </svg>
    </button>
  </body>
</html>
