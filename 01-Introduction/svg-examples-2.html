<!doctype html>
<html lang="en">
  <head>
    <title>SVG Examples - 2</title>

    <style>
      body {
        background-color: #111;
        box-sizing: border-box;

        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        column-gap: 32px;
      }

      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      svg {
        width: 200px;
        border-bottom: 2px solid #ffffff11;
        border-right: 2px solid #ffffff11;
        background-color: #111;
      }

      svg:hover .example {
        transform: scale(1.05);
        transform-origin: center;
      }

      .example {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 0.7;
      }

      .example.x {
        stroke-width: 0.5;
      }

      .item p {
        margin-top: 8px;
        color: #ffffffaa;
        font-family: monospace;
        font-size: 14px;
        transition: 0.2s;
      }

      .item:hover p {
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Z - closing paths -->
      <div class="item">
        <svg viewbox="0 0 16 16">
          <defs>
            <pattern
              id="gridPattern"
              width="1"
              height="1"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M 1 0 L 0 0 0 1"
                fill="none"
                stroke-width="0.2"
                stroke="#ffffff11"
              />
            </pattern>
          </defs>

          <rect width="100%" height="100%" fill="url(#gridPattern)" />

          <path
            class="example"
            d="
              M 4,4
              L 4,12
                12,12
              Z
            "
            stroke="#f48c06"
          />
        </svg>
        <p>`Z` - Closing Path</p>
      </div>

      <!-- l - relative line  -->
      <div class="item">
        <svg viewbox="0 0 16 16">
          <defs>
            <pattern
              id="gridPattern"
              width="1"
              height="1"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M 1 0 L 0 0 0 1"
                fill="none"
                stroke-width="0.2"
                stroke="#ffffff11"
              />
            </pattern>
          </defs>

          <rect width="100%" height="100%" fill="url(#gridPattern)" />

          <path
            class="example"
            d="
              M 4,4
              l 8,0
                0,8
                -8,0
                0,-8
            "
            stroke="#6a994e"
            stroke-width="0.7"
          />
        </svg>
        <p>`l` - Relative Line</p>
      </div>

      <!-- normal circle -->
      <div class="item">
        <svg viewbox="0 0 16 16">
          <defs>
            <pattern
              id="gridPattern"
              width="1"
              height="1"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M 1 0 L 0 0 0 1"
                fill="none"
                stroke-width="0.2"
                stroke="#ffffff11"
              />
            </pattern>
          </defs>

          <rect width="100%" height="100%" fill="url(#gridPattern)" />

          <circle
            class="example"
            cx="8"
            cy="8"
            r="4.5"
            fill="none"
            stroke="#a2d2ff"
          />
        </svg>
        <p>Normal Circle</p>
      </div>

      <!-- X (Twitter) Logo -->
      <div class="item">
        <svg viewbox="0 0 16 16">
          <defs>
            <pattern
              id="gridPattern"
              width="1"
              height="1"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M 1 0 L 0 0 0 1"
                fill="none"
                stroke-width="0.2"
                stroke="#ffffff11"
              />
            </pattern>
          </defs>

          <rect width="100%" height="100%" fill="url(#gridPattern)" />

          <path
            class="example x"
            d="
              M 4,3
              L 5.5,3
                12,13
                10.5,13
                4,3

              M 4,13
              L 7.5,8.5
              M 8.5,7.5
              L 12,3
            "
            stroke="#ef233c"
          />
        </svg>
        <p>X (Twitter) Logo</p>
      </div>
    </div>
  </body>
</html>
